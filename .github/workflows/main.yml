name: Java CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Java 8
        uses: actions/setup-java@v2
        with:
          java-version: '8'
          architecture: 'x64'

      - name: Install dependencies and run tests with Maven
        run: mvn clean test

      - name: Set up Node 18.x
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Publish Cucumber Report
        run: |
          mkdir -p ${{ github.workspace }}/cucumber-report
          cp -r ${{ github.workspace }}/target/cucumber/*.json ${{ github.workspace }}/cucumber-report/
        
      - name: Upload Cucumber Report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: cucumber-report
          path: ${{ github.workspace }}/cucumber-report/
